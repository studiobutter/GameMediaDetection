name: Build & Release GameMediaNotifier

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore dependencies
        run: dotnet restore

      - name: Publish (win-x64 self-contained)
        run: |
          dotnet publish -c Release -r win-x64 ^
          --self-contained true ^
          /p:PublishSingleFile=true ^
          /p:IncludeNativeLibrariesForSelfExtract=true ^
          -o publish

      - name: Copy Assets
        run: |
          mkdir publish\Assets
          copy Assets\icon.ico publish\Assets\icon.ico

      - name: Rename EXE
        run: |
          ren publish\GameMediaDetection.exe GameMediaNotifier.exe

      - name: Create ZIP package
        run: |
          powershell Compress-Archive publish GameMediaNotifier.zip

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: GameMediaNotifier.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
